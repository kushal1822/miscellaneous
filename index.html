<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=https://kushal1822.github.io/graphrag-policy-auditor/" />
    <title>Project Relocated</title>
    <style>
        :root {
            /* Light Mode - Icy White Base */
            --bg-color-light: #f8fafc;
            --card-bg-light: rgba(255, 255, 255, 0.4);
            --card-border-light: rgba(255, 255, 255, 0.6);
            --card-shadow-light: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            --text-main-light: #0f172a;
            --text-muted-light: #475569;
            --code-bg-light: rgba(241, 245, 249, 0.5);
            --code-border-light: rgba(255, 255, 255, 0.5);
            --accent-light: #0ea5e9;
            --orb-1-light: #bae6fd;
            --orb-2-light: #e0f2fe;

            /* Dark Mode - Galaxy Black Base */
            --bg-color-dark: #020617;
            --card-bg-dark: rgba(15, 23, 42, 0.45);
            --card-border-dark: rgba(255, 255, 255, 0.08);
            --card-shadow-dark: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-main-dark: #f8fafc;
            --text-muted-dark: #94a3b8;
            --code-bg-dark: rgba(2, 6, 23, 0.6);
            --code-border-dark: rgba(255, 255, 255, 0.05);
            --accent-dark: #38bdf8;
            --orb-1-dark: #0f172a;
            --orb-2-dark: #1e1b4b;
        }

        /* Responsive System Theme Implementation */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: var(--bg-color-light);
                --card-bg: var(--card-bg-light);
                --card-border: var(--card-border-light);
                --card-shadow: var(--card-shadow-light);
                --text-main: var(--text-main-light);
                --text-muted: var(--text-muted-light);
                --code-bg: var(--code-bg-light);
                --code-border: var(--code-border-light);
                --accent: var(--accent-light);
                --orb-1: var(--orb-1-light);
                --orb-2: var(--orb-2-light);
                --code-keyword: #8b5cf6;
                --code-func: #0284c7;
                --code-str: #16a34a;
                --btn-text: #ffffff;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: var(--bg-color-dark);
                --card-bg: var(--card-bg-dark);
                --card-border: var(--card-border-dark);
                --card-shadow: var(--card-shadow-dark);
                --text-main: var(--text-main-dark);
                --text-muted: var(--text-muted-dark);
                --code-bg: var(--code-bg-dark);
                --code-border: var(--code-border-dark);
                --accent: var(--accent-dark);
                --orb-1: var(--orb-1-dark);
                --orb-2: var(--orb-2-dark);
                --code-keyword: #c678dd;
                --code-func: #61afef;
                --code-str: #98c379;
                --btn-text: #0f172a;
            }
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Aesthetic Ambient Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
            transition: background 0.5s ease;
        }

        .orb-1 {
            width: 40vw;
            height: 40vw;
            top: -10vw;
            left: -10vw;
            background: var(--orb-1);
        }

        .orb-2 {
            width: 30vw;
            height: 30vw;
            bottom: -5vw;
            right: -5vw;
            background: var(--orb-2);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vw) scale(1.1); }
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: var(--card-shadow);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        /* Subtle Inner Glow */
        .container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            background: rgba(128, 128, 128, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--card-border);
            box-shadow: inset 0 4px 6px rgba(128, 128, 128, 0.05);
            position: relative;
            transform: rotate(-5deg);
            transition: transform 0.3s ease, background 0.5s ease, border-color 0.5s ease;
        }

        .container:hover .icon-container {
            transform: rotate(0deg) scale(1.05);
        }

        /* Refined Ping Animation */
        .status-dot {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            background-color: #10b981;
            border-radius: 50%;
            border: 3px solid var(--bg-color);
            transition: border-color 0.5s ease;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #10b981;
            border-radius: 50%;
            top: 0;
            left: 0;
            animation: ping 2.5s cubic-bezier(0, 0, 0.2, 1) infinite;
            z-index: -1;
        }

        @keyframes ping {
            75%, 100% { transform: scale(2.5); opacity: 0; }
        }

        svg {
            width: 32px;
            height: 32px;
            color: var(--text-main);
            opacity: 0.8;
            transition: color 0.5s ease;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.75rem;
            letter-spacing: -0.03em;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 2rem;
            font-size: 1rem;
            font-weight: 400;
            transition: color 0.5s ease;
        }

        /* Glass Code Block */
        .code-snippet {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 12px;
            padding: 1.25rem;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, Monaco, monospace;
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 2.5rem;
            text-align: left;
            overflow-x: auto;
            position: relative;
            transition: background 0.5s ease, border-color 0.5s ease, color 0.5s ease;
        }

        /* Mac-style Window Dots */
        .code-snippet::before {
            content: '';
            display: block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff5f56;
            box-shadow: 16px 0 0 #ffbd2e, 32px 0 0 #27c93f;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .code-snippet span.keyword { color: var(--code-keyword); transition: color 0.5s ease; }
        .code-snippet span.function { color: var(--code-func); transition: color 0.5s ease; }
        .code-snippet span.string { color: var(--code-str); transition: color 0.5s ease; }
        .code-snippet span.property { color: var(--text-main); opacity: 0.9; transition: color 0.5s ease; }

        .btn {
            display: inline-block;
            background: var(--accent);
            color: var(--btn-text);
            text-decoration: none;
            padding: 0.8rem 1.75rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.5s ease, color 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            filter: brightness(1.1);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <div class="container">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
            </svg>
            <div class="status-dot"></div>
        </div>

        <h1>Project Relocated</h1>
        
        <p>This project has been moved to a new repository. Redirecting automatically...</p>

        <div class="code-snippet">
<span class="keyword">function</span> <span class="function">redirect</span>() {
  <span class="keyword">const</span> <span class="property">newUrl</span> = <span class="string">'https://kushal1822.github.io/graphrag-policy-auditor/'</span>;
  <span class="property">window</span>.<span class="property">location</span>.<span class="property">href</span> = <span class="property">newUrl</span>;
}

<span class="function">setTimeout</span>(<span class="property">redirect</span>, <span class="property">3000</span>);
        </div>

        <a href="https://kushal1822.github.io/graphrag-policy-auditor/" class="btn">Go to New Home</a>
    </div>
</body>
</html>
