<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Offline</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle animated background gradient */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(15,23,42,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 3rem;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* Ping animation for the offline indicator */
        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 12px;
            height: 12px;
            background-color: #ef4444; /* Red for offline */
            border-radius: 50%;
            border: 2px solid var(--card-bg);
        }

        .status-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ef4444;
            border-radius: 50%;
            top: 0;
            left: 0;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
            z-index: -1;
        }

        @keyframes ping {
            75%, 100% { transform: scale(2.5); opacity: 0; }
        }

        svg {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 1rem;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 0 2rem;
            font-size: 1.05rem;
        }

        .code-snippet {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1.25rem;
            font-family: 'Fira Code', Consolas, Monaco, 'Courier New', Courier, monospace;
            font-size: 0.875rem;
            color: #e2e8f0;
            margin-bottom: 2rem;
            text-align: left;
            overflow-x: auto;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .code-snippet span.keyword { color: #c678dd; } /* Purple */
        .code-snippet span.function { color: #61afef; } /* Blue */
        .code-snippet span.string { color: #98c379; } /* Green */
        .code-snippet span.comment { color: #7f848e; font-style: italic; } /* Grey */
        .code-snippet span.property { color: #e06c75; } /* Red */

        .btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
    </style>
    <!-- Import Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="icon-container">
            <!-- Cloud Off Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.44 10.44A5.002 5.002 0 0012 20h5.5c.344 0 .678-.035 1-.102m-2.185-5.91A3.5 3.5 0 0015 7.5h-.114a7.001 7.001 0 00-13.43 3.321 3.5 3.5 0 002.502 4.417" />
            </svg>
            <div class="status-dot"></div>
        </div>

        <h1>503: Service Unavailable</h1>
        
        <p>The project has been temporarily taken down due to a cloud hosting issue.</p>

        <div class="code-snippet">
<span class="comment">// Connection status check</span>
<span class="keyword">const</span> <span class="property">project</span> = <span class="keyword">await</span> <span class="function">getServerStatus</span>();

<span class="keyword">if</span> (!<span class="property">project</span>.<span class="property">isOnline</span>) {
  <span class="keyword">throw new</span> <span class="function">Error</span>(<span class="string">"Cloud hosting unavailable"</span>);
}
        </div>

        <a href="javascript:history.back()" class="btn">Return to Resume</a>
    </div>
</body>
</html>
